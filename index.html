<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta content="ie=edge" http-equiv="X-UA-Compatible" />
    <meta name="author" content="Ricardo Trejo" />
    <meta name="description" content="Around The U.S." />
    <title>Around The U.S.</title>
    <link href="./public/pages/index.css" rel="stylesheet" />
  </head>
  <body class="page">
    <div class="page__content">
      <header class="header page__section">
        <img
          alt="Logotipo Around The U.S."
          class="logo header__logo"
          src="./public/images/logo.svg"
        />
      </header>
      <main class="content">
        <section class="profile page__section">
          <button
            class="profile__avatar-button"
            type="button"
            aria-label="Editar avatar"
          >
            <img
              class="profile__image"
              src="./public/images/placeholder.jpg"
              alt="Avatar"
            />
          </button>
          <div class="profile__info">
            <h1 class="profile__title"></h1>
            <button
              aria-label="Editar perfil"
              class="profile__edit-button"
              type="button"
            ></button>
            <p class="profile__description"></p>
          </div>
          <button
            aria-label="Agregar tarjeta"
            class="profile__add-button"
            type="button"
          ></button>
        </section>
        <section class="cards page__section">
          <ul class="cards__list"></ul>
        </section>
      </main>
      <footer class="footer page__section">
        <p class="footer__copyright">© 2025 Around The U.S.</p>
      </footer>

      <!-- Popup Edit Profile -->
      <div class="popup" id="edit-popup">
        <div class="popup__content">
          <button
            aria-label="Cerrar ventana emergente"
            class="popup__close"
            type="button"
          ></button>
          <h3 class="popup__title">Editar perfil</h3>
          <form class="popup__form" id="edit-profile-form">
            <input
              class="popup__input popup__input_type_name"
              id="name-input"
              name="name"
              placeholder="Nombre"
              required
              minlength="2"
              maxlength="40"
              type="text"
            />
            <span class="popup__error" id="name-input-error"></span>
            <input
              class="popup__input popup__input_type_description"
              id="description-input"
              name="description"
              placeholder="Acerca de mí"
              required
              minlength="2"
              maxlength="200"
              type="text"
            />
            <span class="popup__error" id="description-input-error"></span>
            <button class="button popup__button" type="submit">Guardar</button>
          </form>
        </div>
      </div>

      <!-- Popup New Card -->
      <div class="popup" id="new-card-popup">
        <div class="popup__content">
          <button
            aria-label="Cerrar ventana emergente"
            class="popup__close"
            type="button"
          ></button>
          <h3 class="popup__title">Nuevo lugar</h3>
          <form class="popup__form" id="new-card-form">
            <input
              class="popup__input popup__input_type_card-name"
              name="place-name"
              id="card-name-input"
              placeholder="Título"
              required
              minlength="2"
              maxlength="30"
              type="text"
            />
            <span class="popup__error" id="card-name-input-error"></span>
            <input
              class="popup__input popup__input_type_url"
              name="link"
              id="card-url-input"
              placeholder="Enlace a la imagen"
              required
              type="url"
            />
            <span class="popup__error" id="card-url-input-error"></span>
            <button class="button popup__button" type="submit">Crear</button>
          </form>
        </div>
      </div>

      <!-- Popup Image -->
      <div class="popup" id="image-popup">
        <div class="popup__content popup__content_content_image">
          <button
            aria-label="Cerrar ventana emergente"
            class="popup__close"
            type="button"
          ></button>
          <img alt="" class="popup__image" src="#" />
          <p class="popup__caption"></p>
        </div>
      </div>
    </div>
    <!-- Popup delete card -->
    <div class="popup" id="delete-popup">
      <div class="popup__content popup__content_with_confirmation">
        <button
          aria-label="Cerrar ventana emergente"
          class="popup__close"
          type="button"
        ></button>
        <h3 class="popup__title">¿Está seguro/a?</h3>
        <form class="popup__form" id="delete-form">
          <button
            class="button popup__button popup__button_type_delete"
            type="submit"
          >
            Sí
          </button>
        </form>
      </div>
    </div>

    <!-- Popup Edit Profile -->
    <div class="popup" id="edit-avatar-popup">
      <div class="popup__content popup__content_edit-avatar">
        <button
          aria-label="Cerrar ventana emergente"
          class="popup__close"
          type="button"
        ></button>
        <h3 class="popup__title">Cambiar foto de perfil</h3>
        <form class="popup__form" id="edit-avatar-form">
          <input
            class="popup__input popup__input_type_avatar"
            id="avatar-input"
            name="avatar"
            placeholder="Enlace a la imagen"
            type="url"
            required
          />
          <span class="popup__error" id="avatar-input-error"></span>
          <button
            class="button popup__button popup__button_type_edit-avatar"
            type="submit"
          >
            Guardar
          </button>
        </form>
      </div>
    </div>
    <template id="card-template">
      <li class="card">
        <img
          class="card__image"
          src="./public/images/placeholder.jpg"
          alt="Sin título"
        />
        <button
          aria-label="Eliminar tarjeta"
          class="card__delete-button"
          type="button"
        ></button>
        <div class="card__description">
          <h2 class="card__title"></h2>
          <button
            aria-label="Botón Me gusta"
            class="card__like-button"
            type="button"
          ></button>
        </div>
      </li>
    </template>
    <script type="module" src="./public/index.js"></script>
  </body>
</html>
